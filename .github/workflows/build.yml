name: Build binaries

on:
  workflow_dispatch: {}
  release:
    types: [published]

jobs:
  build:
    name: Build binaries (Linux + Windows)
    runs-on: ubuntu-latest
    permissions:
      contents: write # upload release assets

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"

      - name: Build all targets
        run: |
          make dist

      - name: Create checksums
        run: |
          cd dist
          sha256sum * > SHA256SUMS

      - name: Upload artifacts (manual runs)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Upload assets to release
        if: github.event_name == 'release'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" dist/* --clobber

  build-gui:
    name: Build GUI (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write # upload release assets
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-amd64
            runner: ubuntu-latest
            platform: linux/amd64
            ext: ""
          - target: windows-amd64
            runner: windows-latest
            platform: windows/amd64
            ext: ".exe"
          - target: darwin-universal
            runner: macos-latest
            platform: darwin/universal
            ext: ""
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: gui/frontend/package-lock.json

      - name: Install Linux WebKit deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Build GUI
        working-directory: gui
        run: wails build -platform ${{ matrix.platform }} -trimpath -clean

      - name: Stage artifact
        id: stage
        run: |
          set -euo pipefail
          mkdir -p dist-gui
          if [[ "${{ runner.os }}" == "macOS" ]]; then
            cd gui/build/bin
            zip -r "$GITHUB_WORKSPACE/dist-gui/sni-spoofing-gui-${{ matrix.target }}.zip" sni-spoofing-gui.app
            asset="dist-gui/sni-spoofing-gui-${{ matrix.target }}.zip"
          else
            cp "gui/build/bin/sni-spoofing-gui${{ matrix.ext }}" "dist-gui/sni-spoofing-gui-${{ matrix.target }}${{ matrix.ext }}"
            asset="dist-gui/sni-spoofing-gui-${{ matrix.target }}${{ matrix.ext }}"
          fi
          echo "asset=$asset" >> "$GITHUB_OUTPUT"
          if command -v sha256sum >/dev/null; then
            sha256sum "$asset"
          else
            shasum -a 256 "$asset"
          fi

      - name: Upload artifacts (manual runs)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: sni-spoofing-gui-${{ matrix.target }}
          path: ${{ steps.stage.outputs.asset }}

      - name: Upload assets to release
        if: github.event_name == 'release'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.event.release.tag_name }}" "${{ steps.stage.outputs.asset }}" --clobber

  build-and-push-image:
    name: Build and push multi-arch Docker image
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for release
        if: github.event_name == 'release'
        id: meta-release
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/sni-spoofing-go
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Extract metadata (tags, labels) for manual trigger
        if: github.event_name == 'workflow_dispatch'
        id: meta-manual
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/sni-spoofing-go
          tags: |
            type=raw,value=${{ github.ref_name }}-{{sha}}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ github.event_name == 'release' && steps.meta-release.outputs.tags || steps.meta-manual.outputs.tags }}
          labels: ${{ github.event_name == 'release' && steps.meta-release.outputs.labels || steps.meta-manual.outputs.labels }}
